# Input components for icestorm-bin, resolved by edapack-common's
# resolve-inputs.py. See https://edapack.github.io (Developer Guide → build-inputs).
#
# Note: libftdi (1.5) is a fixed-version source tarball (not a git repo), pinned
# in scripts/build.sh; a bump there changes recipe_sha and so still triggers a
# rebuild via the change-gate.
schema: edapack.build-inputs/1

core:
  name: icestorm
  repo: https://github.com/YosysHQ/icestorm
  policy: branch:main          # pin with core_ref=<tag/branch/sha>

name: CI
# Thin caller of the shared edapack build pipeline. Build/release logic lives in
# edapack-common; input components are declared in build-inputs.yaml.
# See https://edapack.github.io (Developer Guide).
#
# NOTE: previous bespoke workflow archived under .github/workflows-legacy/ci.yml.
# Windows (x64) coverage from that workflow is a tracked follow-up.
on:
  push:
  schedule:
    - cron: "0 12 * * 0"   # Sunday 12:00 UTC — publishes only if inputs changed
  workflow_dispatch:
    inputs:
      core_ref:
        description: "Build a specific IceStorm ref (tag/branch/sha)"
        type: string
      input_overrides:
        description: "JSON map of dependency overrides (none for icestorm)"
        type: string
        default: "{}"
      force:
        description: "Build even if inputs are unchanged"
        type: boolean
        default: false
      prerelease:
        description: "Mark the release as prerelease"
        type: boolean
        default: true

jobs:
  build:
    uses: edapack/edapack-common/.github/workflows/build-release.yml@v1
    with:
      package: icestorm-bin
      images: '["manylinux_2_28_x86_64","manylinux_2_34_x86_64","manylinux2014_x86_64"]'
      core_ref: ${{ inputs.core_ref || '' }}
      input_overrides: ${{ inputs.input_overrides || '{}' }}
      force: ${{ github.event_name == 'workflow_dispatch' && inputs.force }}
      prerelease: ${{ github.event_name != 'workflow_dispatch' || inputs.prerelease }}
